name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Run checks and capture logs
        shell: bash
        run: |
          set +e
          mkdir -p ci-logs
          npm run lint > ci-logs/typecheck.log 2>&1
          typecheck_status=$?
          npm run build > ci-logs/build.log 2>&1
          build_status=$?
          echo "typecheck_status=$typecheck_status" > ci-logs/status.env
          echo "build_status=$build_status" >> ci-logs/status.env
          echo "=== Typecheck tail ==="
          tail -n 120 ci-logs/typecheck.log || true
          echo "=== Build tail ==="
          tail -n 120 ci-logs/build.log || true
          if [ "$typecheck_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solobid-sprint-2-ci-diagnostics
          path: ci-logs
